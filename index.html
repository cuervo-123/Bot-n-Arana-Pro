<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tech Blue • One Button (Clone + Drag + Spider 8 + Logo/BG FIX)</title>
<meta name="color-scheme" content="dark">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  :root{
    --accent:#1f8bff; --accent2:#4ac3ff;
    --ink:#eaf2ff; --muted:#a9c0ff;
    --line: rgba(255,255,255,.14);
    --desk: rgba(10,14,32,.10);
    --btnW: 360px; --btnH: 98px; --round: 22px;
    --radius: 160px; --drawerW: 480px;
    --shadow: 0 22px 80px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:transparent;overflow:hidden}

  body::before{
    content:""; position:fixed; inset:-40px;
    background:
      radial-gradient(820px 420px at 50% 45%, color-mix(in oklab, var(--desk) 75%, transparent), transparent 62%),
      radial-gradient(520px 280px at 35% 35%, color-mix(in oklab, var(--accent) 14%, transparent), transparent 64%),
      radial-gradient(520px 280px at 65% 65%, color-mix(in oklab, var(--accent2) 10%, transparent), transparent 64%);
    pointer-events:none; filter: blur(10px); opacity:.95;
  }

  .stage{position:fixed; inset:0; padding:24px;}
  .inst{
    position:absolute;
    left:50%; top:50%;
    transform: translate(-50%,-50%);
    touch-action:none;
  }

  .core{
    position:relative;
    width:var(--btnW); height:var(--btnH);
    border-radius:var(--round);
    border:1px solid var(--line);
    background:
      linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
      radial-gradient(420px 160px at 20% 0%, color-mix(in oklab, var(--accent) 26%, transparent), transparent 58%),
      radial-gradient(420px 160px at 80% 120%, color-mix(in oklab, var(--accent2) 18%, transparent), transparent 58%),
      rgba(0,0,0,.14);
    backdrop-filter: blur(14px);
    box-shadow: var(--shadow);
    cursor:pointer; user-select:none;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 14px 14px 16px; gap:10px;
    transform: translateZ(0);
  }

  /* ✅ FIX stacking definitivo */
  .coreBgOverlay{
    position:absolute; inset:0;
    border-radius: var(--round);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity:.35;
    pointer-events:none;
    filter: saturate(1.05) contrast(1.05);
    mix-blend-mode: screen;
    z-index:0;
  }
  .core > :not(.coreBgOverlay){ position:relative; z-index:1; }

  .left{display:flex; align-items:center; gap:10px; min-width:0;}
  .logo{
    width:44px;height:44px;border-radius:16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border:1px solid rgba(255,255,255,.18);
    box-shadow: 0 14px 30px color-mix(in oklab, var(--accent) 24%, transparent);
    flex:0 0 auto;
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;
  }
  .txt{min-width:0}
  .txt b{display:block;color:var(--ink);font-size:14px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .txt small{display:block;color:var(--muted);font-size:12px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .actions{display:flex; gap:8px; align-items:center; flex:0 0 auto;}
  .chip{
    border:1px solid rgba(255,255,255,.14);
    background: rgba(94, 93, 93, 0.55);
    color: var(--ink);
    padding:9px 10px;
    border-radius:14px;
    font-size:12px;
    cursor:pointer;
  }
  .chip:active{ transform: translateY(1px); }

  /* ===== Spider ===== */
  .spider{position:absolute; left:50%; top:50%; width:1px; height:1px; pointer-events:none;}
  .leg{
    position:absolute; left:50%; top:50%;
    height:2px; transform-origin:left center;
    opacity:0; width:0;
    background: linear-gradient(90deg, rgba(31,139,255,.0), rgba(31,139,255,.55), rgba(74,195,255,.22));
    filter: drop-shadow(0 0 10px rgba(31,139,255,.25));
    transition: width .28s ease, opacity .28s ease;
  }
  .node{
    position:absolute; width:56px; height:56px;
    border-radius:18px;
    transform: translate(-50%,-50%) scale(.72);
    opacity:0;
    pointer-events:auto;
    display:grid; place-items:center;
    border:1px solid rgba(255,255,255,.14);
    background:
      radial-gradient(120px 70px at 30% 30%, rgba(255,255,255,.10), transparent 60%),
      rgba(12,18,44,.85);
    box-shadow: 0 18px 45px rgba(0,0,0,.45);
    transition: transform .28s ease, opacity .28s ease, filter .28s ease;
    backdrop-filter: blur(10px);
  }
  .node:hover{ filter: brightness(1.12); transform: translate(var(--tx), var(--ty)) translate(-50%,-50%) scale(.80); }
  .node i{font-style:normal;font-size:20px;}
  .nodeLabel{
    position:absolute; top:calc(100% + 8px); left:50%;
    transform:translateX(-50%);
    font-size:11px; color:rgba(233,242,255,.9);
    padding:6px 8px; border-radius:999px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.22);
    white-space:nowrap;
  }

  .node[data-a="0"]   { --ux:  0;    --uy: -1; }
  .node[data-a="45"]  { --ux:  0.707;--uy: -0.707; }
  .node[data-a="90"]  { --ux:  1;    --uy:  0; }
  .node[data-a="135"] { --ux:  0.707;--uy:  0.707; }
  .node[data-a="180"] { --ux:  0;    --uy:  1; }
  .node[data-a="225"] { --ux: -0.707;--uy:  0.707; }
  .node[data-a="270"] { --ux: -1;    --uy:  0; }
  .node[data-a="315"] { --ux: -0.707;--uy: -0.707; }

  .open .node{
    opacity:1;
    --tx: calc(var(--ux) * var(--radius));
    --ty: calc(var(--uy) * var(--radius));
    transform: translate(var(--tx), var(--ty)) translate(-50%,-50%) scale(.78);
  }
  .open .leg{ opacity:1; width: calc(var(--radius) - 22px); }

  .leg[data-a="0"]   { transform: translate(0,-1px) rotate(-90deg); }
  .leg[data-a="45"]  { transform: translate(0,-1px) rotate(-45deg); }
  .leg[data-a="90"]  { transform: translate(0,-1px) rotate( 0deg); }
  .leg[data-a="135"] { transform: translate(0,-1px) rotate( 45deg); }
  .leg[data-a="180"] { transform: translate(0,-1px) rotate( 90deg); }
  .leg[data-a="225"] { transform: translate(0,-1px) rotate(135deg); }
  .leg[data-a="270"] { transform: translate(0,-1px) rotate(180deg); }
  .leg[data-a="315"] { transform: translate(0,-1px) rotate(-135deg); }

  /* Drawer */
  .drawer{
    position:fixed; top:50%; right:18px;
    transform: translateY(-50%);
    width:min(var(--drawerW), calc(100vw - 36px));
    max-height: min(86vh, 820px);
    overflow:auto;
    border-radius:22px;
    border:1px solid rgba(255,255,255,.14);
    background:
      radial-gradient(560px 240px at 15% 0%, rgba(31,139,255,.18), transparent 60%),
      rgba(10,14,32,.86);
    box-shadow: 0 30px 90px rgba(0,0,0,.65);
    backdrop-filter: blur(12px);
    display:none; z-index:200;
  }
  .drawer.show{ display:block; }
  .dTop{
    position:sticky; top:0;
    padding:12px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    border-bottom:1px solid rgba(255,255,255,.10);
    background: rgba(10,14,32,.80);
    backdrop-filter: blur(12px);
  }
  .dTop b{ font-size:13px; color:rgba(233,242,255,.95); }
  .xbtn{
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color:var(--ink);
    border-radius:12px;
    padding:9px 10px;
    cursor:pointer;
  }
  .dBody{ padding:12px; display:grid; gap:10px; }

  .card{border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.04); border-radius:18px; padding:12px;}
  .card h3{ margin:0 0 6px 0; font-size:12px; }
  .card p{ margin:0 0 10px 0; font-size:12px; color:var(--muted); line-height:1.35; }

  input,textarea{
    width:100%;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.22);
    color:var(--ink);
    padding:10px 12px;
    outline:none;
    font-size:13px;
  }
  textarea{ min-height:120px; resize:vertical; }

  .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:10px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(31,139,255,.12);
    color:var(--ink);
    cursor:pointer;
    font-size:13px;
    text-decoration:none;
  }
  .btn.secondary{ background: rgba(255,255,255,.06); }
  .btn.good{ background: rgba(32,201,151,.14); }
  .btn.bad{ background: rgba(239,71,111,.14); }

  .toast{
    position:fixed; left:50%; bottom:16px;
    transform:translateX(-50%);
    background: rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.14);
    color:var(--ink);
    border-radius:999px;
    padding:10px 12px;
    font-size:12px;
    display:none;
    z-index:999;
    backdrop-filter: blur(10px);
  }
  .toast.show{ display:block; }
</style>
</head>
<body>

<div class="stage" id="stage"></div>

<div class="drawer" id="drawer" aria-hidden="true">
  <div class="dTop">
    <b id="dTitle">Módulo</b>
    <button class="xbtn" id="dClose">Cerrar ✕</button>
  </div>
  <div class="dBody" id="dBody"></div>
</div>

<div class="toast" id="toast">Listo</div>
<script>
    const $ = (q, el=document)=> el.querySelector(q);
    const toastEl = $("#toast");
    function toast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(window.__t);
      window.__t = setTimeout(()=>toastEl.classList.remove("show"), 1400);
    }
    function esc(s){
      return String(s ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function uid(){
      return (crypto.randomUUID?.() || ("id_"+Date.now()+"_"+Math.random().toString(16).slice(2)));
    }
  
    const MASTER_KEY = "tb_onebutton_instances_v3";
    const STATE_KEY  = (id)=> "tb_onebutton_state_" + id;
  
    function defaultState(){
      return {
        accent:"#1f8bff", accent2:"#4ac3ff",
        desk:"rgba(10,14,32,.10)",
        title:"Tech Blue • One Button",
        sub:"Click/Enter: araña • Esc: cerrar",
        pos:{ x:null, y:null },
  
        cardLogoDataUrl:"",
        cardLogoMode:"icon",    // icon | bg
        cardBgOpacity:0.35,
  
        socials:[
          {name:"Mi TV Station v10.3", url:"https://cuervo-123.github.io/mi-tv-station-v-10.3/"},
          {name:"YouTube", url:"https://youtube.com"}
        ],
        links:[],
        playlists:[],
        favs:[],
        queue:[]
      };
    }
  
    function loadIds(){ try{ const a=JSON.parse(localStorage.getItem(MASTER_KEY)||"[]"); return Array.isArray(a)?a:[]; }catch(_){return[];} }
    function saveIds(ids){ localStorage.setItem(MASTER_KEY, JSON.stringify(ids)); }
    function loadState(id){
      try{
        const raw = localStorage.getItem(STATE_KEY(id));
        if(!raw) return null;
        const s = JSON.parse(raw);
        const d = defaultState();
        return {...d, ...s, pos:{...d.pos, ...(s.pos||{})}};
      }catch(_){ return null; }
    }
    function saveState(id, st){ localStorage.setItem(STATE_KEY(id), JSON.stringify(st)); }
  
    const stage = $("#stage");
    const INST = new Map(); // id -> {wrap, core, logo, titleEl, subEl, bgOverlay}
    let activeIdForImage = null;
  
    // Shared image input
    const cardFile = document.createElement("input");
    cardFile.type="file"; cardFile.accept="image/*"; cardFile.style.display="none";
    document.body.appendChild(cardFile);
  
    function openCardImagePicker(forId){
      activeIdForImage = forId;
      cardFile.value = "";
      cardFile.click();
    }
  
    function fileToDataUrl(file){
      return new Promise((resolve,reject)=>{
        const r=new FileReader();
        r.onload=()=>resolve(String(r.result||""));
        r.onerror=reject;
        r.readAsDataURL(file);
      });
    }
  
    function resizeImageDataUrl(dataUrl, maxSide=512){
      return new Promise((resolve,reject)=>{
        const img=new Image();
        img.onload=()=>{
          const w=img.width,h=img.height;
          const scale=Math.min(1, maxSide/Math.max(w,h));
          const nw=Math.max(1, Math.round(w*scale));
          const nh=Math.max(1, Math.round(h*scale));
          const c=document.createElement("canvas");
          c.width=nw; c.height=nh;
          c.getContext("2d").drawImage(img,0,0,nw,nh);
          try{ resolve(c.toDataURL("image/webp",0.86)); }
          catch(_){ resolve(c.toDataURL("image/png")); }
        };
        img.onerror=reject;
        img.src=dataUrl;
      });
    }
  
    cardFile.addEventListener("change", async ()=>{
      const file = cardFile.files && cardFile.files[0];
      if(!file || !activeIdForImage) return;
  
      const id = activeIdForImage;
      const st = loadState(id) || defaultState();
  
      const dataUrl = await fileToDataUrl(file);
      try{ st.cardLogoDataUrl = await resizeImageDataUrl(dataUrl, 512); }
      catch(_){ st.cardLogoDataUrl = dataUrl; }
  
      saveState(id, st);
      applyTheme(id);
      applyCardLogo(id);
      toast("Logo/Background ✅");
    });
  
    function applyTheme(id){
      const st = loadState(id) || defaultState();
      const ref = INST.get(id);
      if(!ref) return;
  
      ref.core.style.setProperty("--accent", st.accent);
      ref.core.style.setProperty("--accent2", st.accent2);
  
      // glow global
      document.documentElement.style.setProperty("--desk", st.desk);
      document.documentElement.style.setProperty("--accent", st.accent);
      document.documentElement.style.setProperty("--accent2", st.accent2);
  
      ref.titleEl.textContent = st.title || "Tech Blue • One Button";
      ref.subEl.textContent   = st.sub   || "Click/Enter: araña • Esc: cerrar";
    }
  
    function ensureBgOverlay(id){
      const ref = INST.get(id);
      if(!ref) return null;
      if(ref.bgOverlay) return ref.bgOverlay;
      const ov=document.createElement("div");
      ov.className="coreBgOverlay";
      ref.core.insertBefore(ov, ref.core.firstChild);
      ref.bgOverlay = ov;
      return ov;
    }
  
    function applyCardLogo(id){
      const st = loadState(id) || defaultState();
      const ref = INST.get(id);
      if(!ref) return;
  
      const img = st.cardLogoDataUrl || "";
      const mode = st.cardLogoMode || "icon";
      const op = (typeof st.cardBgOpacity==="number") ? st.cardBgOpacity : 0.35;
  
      // reset overlay
      if(ref.bgOverlay){
        ref.bgOverlay.style.backgroundImage = "";
        ref.bgOverlay.style.opacity = String(op);
      }
  
      if(mode === "icon"){
        if(img){
          ref.logo.style.background = ""; // ✅ kill shorthand
          ref.logo.style.backgroundImage = `url('${img}')`;
          ref.logo.style.backgroundSize = "contain";
          ref.logo.style.backgroundRepeat = "no-repeat";
          ref.logo.style.backgroundPosition = "center";
        }else{
          ref.logo.style.backgroundImage = "";
          ref.logo.style.background = "linear-gradient(135deg, var(--accent), var(--accent2))";
        }
        if(ref.bgOverlay) ref.bgOverlay.style.backgroundImage = "";
        return;
      }
  
      // BG mode
      if(img){
        const ov = ensureBgOverlay(id);
        ov.style.backgroundImage = `url('${img}')`;
        ov.style.opacity = String(op);
  
        // keep icon gradient
        ref.logo.style.backgroundImage = "";
        ref.logo.style.background = "linear-gradient(135deg, var(--accent), var(--accent2))";
      }else{
        if(ref.bgOverlay) ref.bgOverlay.style.backgroundImage = "";
      }
    }
  
    // Drawer
    const drawer = $("#drawer"), dTitle=$("#dTitle"), dBody=$("#dBody");
    $("#dClose").onclick = ()=> drawer.classList.remove("show");
    function showDrawer(title){ dTitle.textContent=title; drawer.classList.add("show"); }
  
    document.addEventListener("keydown",(e)=>{
      if(e.key==="Escape"){
        INST.forEach(ref=> ref.core.classList.remove("open"));
        drawer.classList.remove("show");
      }
    });
  
    const titles = {
      player:"🎬 Player", fav:"⭐ Fav", m3u:"📺 M3U", links:"🔗 Links",
      look:"🎨 Look", social:"🌐 Social", ai:"🤖 AI", sys:"⚙️ Sys"
    };
  
    function renderModule(id, mod){
      showDrawer(titles[mod] || "Módulo");
      if(mod==="look") return renderLook(id);
      if(mod==="social") return renderSocial(id);
      if(mod==="sys") return renderSys(id);
  
      // placeholders (para que la araña tenga los 8 y no falten “brazos”)
      dBody.innerHTML = `
        <div class="card">
          <h3>${esc(titles[mod] || "Módulo")}</h3>
          <p>Este módulo está en placeholder. (Araña completa ✅)</p>
        </div>
      `;
    }
    
  function cloneButton(fromId){
    const from = loadState(fromId) || defaultState();
    const id = uid();
    const st = defaultState();

    // clonamos look/card/text
    st.accent=from.accent; st.accent2=from.accent2; st.desk=from.desk;
    st.title=from.title; st.sub=from.sub;
    st.cardLogoDataUrl = from.cardLogoDataUrl;
    st.cardLogoMode = from.cardLogoMode;
    st.cardBgOpacity = from.cardBgOpacity;

    const p = from.pos || {};
    st.pos = { x:(p.x ?? 80)+30, y:(p.y ?? 90)+30 };

    const ids = loadIds(); ids.push(id); saveIds(ids);
    saveState(id, st);
    createInstance({id, state:st});
    toast("Clonado ✅");
  }

  function createInstance({id, state}){
    const wrap=document.createElement("div");
    wrap.className="inst"; wrap.dataset.id=id;

    if(state.pos && state.pos.x!=null && state.pos.y!=null){
      wrap.style.left=state.pos.x+"px";
      wrap.style.top =state.pos.y+"px";
      wrap.style.transform="translate(0,0)";
    }

    wrap.innerHTML = `
      <div class="core" role="button" tabindex="0" data-core>
        <div class="left">
          <div class="logo" data-logo title="Click para cambiar logo"></div>
          <div class="txt">
            <b data-title>Tech Blue • One Button</b>
            <small data-sub>Click/Enter: araña • Esc: cerrar</small>
          </div>
        </div>
        <div class="actions">
          <button class="chip" data-toggle title="Araña">⚡</button>
        </div>

        <div class="spider" data-spider>
          <div class="leg" data-a="0"></div><div class="leg" data-a="45"></div><div class="leg" data-a="90"></div><div class="leg" data-a="135"></div>
          <div class="leg" data-a="180"></div><div class="leg" data-a="225"></div><div class="leg" data-a="270"></div><div class="leg" data-a="315"></div>

          <!-- ✅ 8 NODOS completos -->
          <div class="node" data-a="0"   data-mod="player"><i>🎬</i><div class="nodeLabel">Player</div></div>
          <div class="node" data-a="45"  data-mod="fav"><i>⭐</i><div class="nodeLabel">Fav</div></div>
          <div class="node" data-a="90"  data-mod="m3u"><i>📺</i><div class="nodeLabel">M3U</div></div>
          <div class="node" data-a="135" data-mod="links"><i>🔗</i><div class="nodeLabel">Links</div></div>
          <div class="node" data-a="180" data-mod="look"><i>🎨</i><div class="nodeLabel">Look</div></div>
          <div class="node" data-a="225" data-mod="social"><i>🌐</i><div class="nodeLabel">Social</div></div>
          <div class="node" data-a="270" data-mod="ai"><i>🤖</i><div class="nodeLabel">AI</div></div>
          <div class="node" data-a="315" data-mod="sys"><i>⚙️</i><div class="nodeLabel">Sys</div></div>
        </div>
      </div>
    `;
    stage.appendChild(wrap);

    const core = wrap.querySelector("[data-core]");
    const logo = wrap.querySelector("[data-logo]");
    const titleEl = wrap.querySelector("[data-title]");
    const subEl   = wrap.querySelector("[data-sub]");
    const toggle  = wrap.querySelector("[data-toggle]");

    INST.set(id, {wrap, core, logo, titleEl, subEl, bgOverlay:null});

    applyTheme(id);
    applyCardLogo(id);

    // ✅ LOGO: click NO lo bloquea el drag
    logo.addEventListener("click",(e)=>{
      e.stopPropagation();
      openCardImagePicker(id);
    });

    toggle.addEventListener("click",(e)=>{ e.stopPropagation(); core.classList.toggle("open"); });

    core.addEventListener("click",(e)=>{
      if(e.target.closest(".node") || e.target.closest("button")) return;
      core.classList.toggle("open");
    });

    wrap.querySelectorAll(".node").forEach(n=>{
      n.addEventListener("click",(e)=>{
        e.stopPropagation();
        core.classList.add("open");
        renderModule(id, n.dataset.mod);
      });
    });

    // ✅ DRAG: solo si agarras “cuerpo”, no logo, no botones, no nodos
    let drag={on:false,dx:0,dy:0};
    core.addEventListener("pointerdown",(e)=>{
      if(e.target.closest("[data-logo]") || e.target.closest(".actions") || e.target.closest("button") || e.target.closest(".node")) return;

      drag.on=true;
      const r=wrap.getBoundingClientRect();
      drag.dx=e.clientX-r.left;
      drag.dy=e.clientY-r.top;

      core.setPointerCapture(e.pointerId);
      core.style.cursor="grabbing";
    });

    core.addEventListener("pointermove",(e)=>{
      if(!drag.on) return;
      const x=e.clientX-drag.dx;
      const y=e.clientY-drag.dy;

      const nx=Math.max(0, Math.min(window.innerWidth-wrap.offsetWidth, x));
      const ny=Math.max(0, Math.min(window.innerHeight-wrap.offsetHeight, y));

      wrap.style.left=nx+"px";
      wrap.style.top =ny+"px";
      wrap.style.transform="translate(0,0)";

      const st=loadState(id)||defaultState();
      st.pos={x:nx,y:ny};
      saveState(id, st);
    });

    core.addEventListener("pointerup",()=>{ drag.on=false; core.style.cursor="pointer"; });
    core.addEventListener("pointercancel",()=>{ drag.on=false; core.style.cursor="pointer"; });
  }

  function renderLook(id){
    const st = loadState(id) || defaultState();
    dBody.innerHTML = `
      <div class="card">
        <h3>Card (Logo / Background)</h3>
        <p>Click en el logo del botón o usa “Cargar imagen”.</p>

        <div class="row">
          <button class="btn good" id="up">🖼️ Cargar imagen</button>
          <button class="btn bad" id="clr">🗑️ Quitar</button>
        </div>

        <div class="row" style="margin-top:10px">
          <button class="btn ${st.cardLogoMode==="icon"?"good":"secondary"}" id="mIcon">🧩 Icon</button>
          <button class="btn ${st.cardLogoMode==="bg"?"good":"secondary"}" id="mBg">🖼️ Background</button>
        </div>

        <label style="display:block;margin-top:10px;font-size:12px;color:var(--muted)">
          Opacidad BG: <span id="opVal">${Number(st.cardBgOpacity||0.35).toFixed(2)}</span>
        </label>
        <input id="op" type="range" min="0.10" max="0.70" step="0.01" value="${esc(String(st.cardBgOpacity ?? 0.35))}">
      </div>
    `;

    $("#up").onclick = ()=> openCardImagePicker(id);

    $("#clr").onclick = ()=>{
      st.cardLogoDataUrl="";
      saveState(id, st);
      applyCardLogo(id);
      toast("Quitado ✅");
      renderLook(id);
    };

    $("#mIcon").onclick = ()=>{
      st.cardLogoMode="icon";
      saveState(id, st);
      applyCardLogo(id);
      renderLook(id);
    };

    $("#mBg").onclick = ()=>{
      st.cardLogoMode="bg";
      saveState(id, st);
      applyCardLogo(id);
      renderLook(id);
    };

    $("#op").oninput = ()=>{
      st.cardBgOpacity = Number($("#op").value);
      $("#opVal").textContent = st.cardBgOpacity.toFixed(2);
      saveState(id, st);
      applyCardLogo(id);
    };
  }

  function renderSocial(id){
    const st = loadState(id) || defaultState();
    dBody.innerHTML = `
      <div class="card">
        <h3>Social</h3>
        ${(st.socials||[]).map(s=>`
          <div class="card" style="padding:10px">
            <b style="font-size:12px">${esc(s.name)}</b>
            <div style="color:var(--muted);font-size:12px;margin-top:4px;word-break:break-all">${esc(s.url)}</div>
            <div class="row" style="margin-top:8px">
              <a class="btn secondary" href="${esc(s.url)}" target="_blank" rel="noopener">Abrir</a>
            </div>
          </div>
        `).join("")}
      </div>
    `;
  }

  function renderSys(id){
    dBody.innerHTML = `
      <div class="card">
        <h3>Sys</h3>
        <div class="row">
          <button class="btn good" id="clone">🧬 Clone</button>
          <button class="btn secondary" id="reset">Reset this</button>
        </div>
      </div>
    `;
    $("#clone").onclick = ()=> cloneButton(id);
    $("#reset").onclick = ()=>{
      localStorage.removeItem(STATE_KEY(id));
      const st = defaultState();
      saveState(id, st);
      applyTheme(id);
      applyCardLogo(id);
      toast("Reset ✅");
    };
  }

  // Boot
  (function boot(){
    let ids = loadIds();
    if(ids.length===0){
      const id=uid();
      ids=[id]; saveIds(ids);
      saveState(id, defaultState());
    }

    ids.forEach((id, idx)=>{
      const st = loadState(id) || defaultState();
      if(st.pos.x==null || st.pos.y==null){
        st.pos={ x:80+idx*30, y:90+idx*30 };
        saveState(id, st);
      }
      createInstance({id, state:st});
    });

    toast("Listo ✅ (Araña 8 + Logo/BG FIX)");
  })();
</script>

</body>
</html>
